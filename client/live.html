<!--
  RickShare Live (client/live.html)
  Purpose: Live tracking demo showing two moving users and passenger progress along a ride.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RickShare — Live Tracking</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./assets/styles.css" />
    <style>
      .panel { background: var(--panel); border: 1px solid #1f2937; border-radius: 0.75rem; padding: 1rem; }
      .row { display: grid; gap: 0.5rem; grid-template-columns: 1fr; }
      .grid { display: grid; gap: 1rem; grid-template-columns: 2fr 1fr; }
      .small { color: var(--muted); font-size: 0.9rem; }
      #map { height: 520px; }
    </style>
  </head>
  <body>
    <header class="app-header">
      <h1>Live Ride Tracking</h1>
      <p class="subtitle">Simulated movement via SSE</p>
      <p><a href="./index.html" style="color: #fff;">← Back to app</a></p>
    </header>

    <main class="app-main">
      <section class="panel">
        <div class="row">
          <label for="rideId">Ride ID</label>
          <input id="rideId" placeholder="Paste a ride ID" />
          <button id="startBtn" type="button">Start Live</button>
          <small class="small">Streams from /api/rides/live/:id; falls back to local simulation if SSE unavailable.</small>
        </div>
      </section>
      <div class="grid">
        <section class="panel">
          <h2>Map</h2>
          <div id="map"></div>
        </section>
        <aside class="panel">
          <h2>Status</h2>
          <pre id="status" class="small"></pre>
        </aside>
      </div>
    </main>

    <footer class="app-footer">
      <small>Demo purposes only</small>
    </footer>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./src/live.js"></script>
  </body>
</html>
